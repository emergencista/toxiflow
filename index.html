<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ToxiFlow V23</title>

  <!-- === ÍCONES (Cache Busting v3) === -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=3" />
  <link rel="icon" type="image/png" href="icons/apple-touch-icon.png?v=3" />
  <link rel="manifest" href='data:application/manifest+json,{"name":"ToxiFlow","short_name":"ToxiFlow","start_url":".","display":"standalone","theme_color":"#0f172a","background_color":"#f0f2f5","icons":[{"src":"icons/apple-touch-icon.png","sizes":"512x512","type":"image/png"}]}' />

  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    /* BASE */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding-bottom: 130px; /* Aumentado para o novo rodapé */ }
    
    /* HEADER */
    header { background: #0f172a; color: white; padding: 24px 20px; border-radius: 0 0 24px 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    p { opacity: 0.8; font-size: 0.9rem; }
    
    /* LAYOUT */
    .container { max-width: 480px; margin: 0 auto; padding: 20px; margin-top: -15px; }
    .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
    
    label { font-size: 0.75rem; font-weight: 800; color: #64748b; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 1rem; margin-bottom: 5px; background: #fff; color: #1e293b; }
    input:focus, select:focus { outline: none; border-color: #2563eb; }

    /* FOOTER FIXO (Ajustado) */
    .fixed-footer { 
      position: fixed; bottom: 0; left: 0; right: 0; 
      background: #1e293b; color: white; 
      display: flex; flex-direction: column; /* Coluna para caber texto e botões */
      justify-content: center; align-items: center; 
      padding: 15px 20px 20px; 
      z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.15); 
      gap: 12px;
    }
    .footer-buttons { display: flex; gap: 15px; width: 100%; justify-content: center; }
    .phone-btn { color: white; text-decoration: none; font-weight: 700; background: rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 50px; font-size: 0.9rem; white-space: nowrap; }
    .credits { font-size: 0.75rem; opacity: 0.6; color: #cbd5e1; text-decoration: none; font-weight: 500; letter-spacing: 0.5px; }

    /* COMPONENTES */
    .panel { display: none; padding: 20px; border-radius: 16px; color: white; text-align: center; margin-bottom: 15px; }
    .toxic { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .safe { background: linear-gradient(135deg, #22c55e, #15803d); }
    
    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; color: white; cursor: pointer; margin-top: 10px; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-dark { background: #334155; }
    .btn-blue { background: #2563eb; }
    .btn-nac { background: #7c3aed; }
    
    .result-box { margin-top:12px; padding:15px; border-radius:12px; font-size:0.95rem; line-height:1.4; display:none; animation: fadeIn 0.3s; }
    .res-green { background:#dcfce7; color:#166534; border:1px solid #86efac; }
    .res-red { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .res-blue { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; }
    
    @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
    .modal-box { background: white; width: 90%; max-width: 400px; padding: 24px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    
    .check-item { padding: 16px; margin-bottom: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.2s; }
    .check-item.checked { background: #eff6ff; border-color: #2563eb; }
    .circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #cbd5e1; background: white; flex-shrink: 0; display:grid; place-items:center; }
    .check-item.checked .circle { background: #2563eb; border-color: #2563eb; }
    .check-item.checked .circle::after { content:'✓'; color:white; font-size:14px; font-weight:bold; }

    /* AUTOCOMPLETE */
    .results { background: white; border: 1px solid #e2e8f0; max-height: 250px; overflow-y: auto; display: none; position: absolute; top: 85px; left: 20px; right: 20px; border-radius: 12px; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .opt { padding: 14px 18px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    .opt:active { background: #f1f5f9; }
  </style>
</head>
<body>

  <header>
    <h1>ToxiFlow</h1>
    <p>CIATox-BA v23.0</p>
  </header>

  <div class="container">
    <div class="card">
      <label>Substância (Busca Rápida)</label>
      <input type="text" id="search" placeholder="Ex: Diazepam, Mounjaro..." autocomplete="off">
      <div class="results" id="results"></div>
      <div id="drugInfo" style="margin-top:12px; font-size:0.95rem; color:#475569; padding-top:10px; border-top:1px dashed #e2e8f0;"></div>
    </div>

    <div class="card">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div>
          <label>Peso (kg)</label>
          <input type="number" id="weight" placeholder="70" inputmode="decimal">
        </div>
        <div>
          <label>Dose Ingerida</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="dose" placeholder="0" inputmode="decimal">
            <select id="unit" style="width:80px;"><option value="mg">mg</option><option value="g">g</option><option value="mcg">mcg</option></select>
          </div>
        </div>
      </div>
    </div>

    <div id="panel" class="panel">
      <h2 id="statusTitle" style="margin:0 0 5px 0;"></h2>
      <p id="statusDesc"></p>
    </div>

    <div id="clinical" style="display:none;">
      <div id="actionsArea"></div>
      <div class="card" style="margin-top:15px;">
        <label>Tempo Decorrido</label>
        <select id="time">
          <option value="">Selecione...</option>
          <option value="1">&lt; 1 hora</option>
          <option value="2">1 a 2 horas</option>
          <option value="4">> 2 horas</option>
        </select>
        <div id="charcoalArea"></div>
      </div>
    </div>
  </div>

  <!-- RODAPÉ ATUALIZADO V23 -->
  <div class="fixed-footer">
    <div class="footer-buttons">
      <a href="tel:08002844343" class="phone-btn">📞 0800 284 4343</a>
      <a href="tel:7131034343" class="phone-btn">📞 (71) 3103-4343</a>
    </div>
    <a href="https://instagram.com/biaandrade_c" target="_blank" class="credits">Desenvolvido por @biaandrade_c</a>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <h3 id="modalTitle" style="color:#0f172a; margin:0 0 10px 0;"></h3>
      <p id="modalDesc" style="color:#64748b; font-size:0.9rem; margin-bottom:15px;"></p>
      <div id="checkList"></div>
      <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:10px; margin-top:20px;">
        <button class="btn btn-dark" style="margin:0; background:#e2e8f0; color:#334155;" id="btnCancel">Cancelar</button>
        <button class="btn btn-blue" style="margin:0;" id="btnConfirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    // === INICIALIZAÇÃO SEGURA ===
    window.addEventListener('DOMContentLoaded', function() {
      
      // === BANCO DE DADOS ===
      const drugData = [
        { n:"Mounjaro (Tirzepatida)", d:0.01, u:"mg", mv:"5d", ant:"Suporte", risk:"⚠️ Desidratação Grave.", noChar:true, ref:"AACT" },
        { n:"Ozempic (Semaglutida)", d:0.01, u:"mg", mv:"1sem", ant:"Suporte", risk:"⚠️ Vômitos incoercíveis.", noChar:true, ref:"AACT" },
        { n:"Saxenda (Liraglutida)", d:0.1, u:"mg", mv:"13h", ant:"Suporte", risk:"⚠️ Desidratação grave.", noChar:true, ref:"AACT" },
        { n:"Litio", d:50, u:"mg", mv:"24h", noChar:true, risk:"⚠️ Hemodiálise se grave.", ref:"AACT" },
        { n:"Ferro", d:20, u:"mg", mv:"6h", noChar:true, risk:"⚠️ Irritação gástrica grave.", ref:"AACT" },
        { n:"Cetamina (Ketamina)", d:2, u:"mg", mv:"2.5h", ant:"Benzos", inds:["Agitação"], ref:"AACT" },
        { n:"Bupropiona", d:10, u:"mg", mv:"20h", ant:"Benzos", risk:"⚠️ Risco de convulsão tardia.", ref:"AACT" },
        { n:"Ritalina (Metilfenidato)", d:1, u:"mg", mv:"3h", ant:"Benzos", risk:"⚠️ Síndrome Simpaticomimética.", ref:"AACT" },
        { n:"Venvanse", d:1, u:"mg", mv:"1h", ant:"Benzos", risk:"⚠️ Síndrome Simpaticomimética.", ref:"AACT" },
        { n:"Atomoxetina", d:2, u:"mg", mv:"5h", ant:"Suporte", risk:"⚠️ Taquicardia.", ref:"AACT" },
        { n:"Propranolol", d:8, u:"mg", mv:"4h", ant:"Glucagon", inds:["Bradicardia"], ref:"AACT" },
        { n:"Atenolol", d:5, u:"mg", mv:"6h", ant:"Glucagon", inds:["Bradicardia"], ref:"AACT" },
        { n:"Anlodipino", d:0.3, u:"mg", mv:"50h", ant:"Cálcio+Insulina", inds:["Choque"], ref:"AACT" },
        { n:"Glibenclamida", d:0.1, u:"mg", mv:"10h", ant:"Octreotide", inds:["Hipoglicemia"], ref:"AACT" },
        { n:"Metformina", d:80, u:"mg", mv:"6h", ant:"Hemodiálise", risk:"⛔ Acidose Lática.", ref:"AACT" },
        { n:"Carbamazepina", d:20, u:"mg", mv:"20h", ant:"Carvão Seriado", risk:"⚠️ Neurotoxicidade.", ref:"AACT" },
        { n:"Varfarina", d:0.5, u:"mg", mv:"40h", ant:"Vitamina K", inds:["Sangramento"], ref:"AACT" },
        { n:"Dipirona", d:100, u:"mg", mv:"2-4h", ant:"Suporte", risk:"⚠️ Choque.", ref:"AACT" },
        { n:"Escopolamina", d:2, u:"mg", mv:"8h", ant:"Suporte", risk:"⚠️ Sínd. Anticolinérgica.", ref:"AACT" },
        { n:"Metoclopramida", d:2, u:"mg", mv:"6h", ant:"Biperideno", inds:["Distonia"], ref:"AACT" },
        { n:"Quetiapina", d:15, u:"mg", mv:"7h", ant:"Lipídeos", risk:"⚠️ Hipotensão.", ref:"AACT" },
        { n:"Sertralina", d:10, u:"mg", mv:"26h", ant:"Suporte", risk:"⚠️ Sínd. Serotoninérgica.", ref:"AACT" },
        { n:"Escitalopram", d:5, u:"mg", mv:"30h", ant:"Suporte", risk:"⚠️ QT Longo.", ref:"AACT" },
        { n:"Cocaina", d:1.0, u:"mg", mv:"1h", ant:"Benzos", risk:"🚫 Não usar Beta-bloq.", ref:"AHA" },
        { n:"Clonazepam", d:0.6, u:"mg", mv:"40h", ant:"Flumazenil", risk:"🚫 Risco convulsão.", ref:"AACT" },
        { n:"Diazepam", d:0.7, u:"mg", mv:"48h", ant:"Flumazenil", risk:"🚫 Risco convulsão.", ref:"AACT" },
        { n:"Midazolam", d:1.0, u:"mg", mv:"2.5h", ant:"Flumazenil", ref:"AACT" },
        { n:"Morfina", d:0.4, u:"mg", mv:"3h", ant:"Naloxona", inds:["FR < 12"], ref:"AACT" },
        { n:"Tramadol", d:4, u:"mg", mv:"9h", ant:"Naloxona", risk:"⚠️ Risco convulsão.", ref:"AACT" },
        { n:"Paracetamol", d:75, u:"mg", mv:"3h", ant:"NAC", isNac:true, ref:"Rumack" },
        { n:"Lidocaina", d:5, u:"mg", mv:"1.5h", ant:"Lipídeos", ref:"AACT" },
        { n:"Digoxina", d:20, u:"mcg", mv:"40h", ant:"Ac Fab", ref:"AACT" },
        { n:"Amitriptilina", d:3, u:"mg", mv:"25h", ant:"Bicarbonato", ref:"AACT" },
        { n:"Jardiance", d:10, u:"mg", mv:"12h", ant:"Protocolo CAD", risk:"⛔ Cetoacidose.", ref:"AACT" },
        { n:"Dapagliflozina", d:10, u:"mg", mv:"12h", ant:"Protocolo CAD", risk:"⛔ Cetoacidose.", ref:"AACT" },
        { n:"AAS", d:100, u:"mg", mv:"30h", ref:"AACT" }
      ];

      // === VARIÁVEIS GLOBAIS ===
      let selectedDrug = null;
      let modalType = '';
      
      const el = (id) => document.getElementById(id);

      // === BUSCA ===
      const searchInput = el('search');
      const resultsDiv = el('results');

      if (searchInput) {
        searchInput.addEventListener('input', function(e) {
          const v = e.target.value.toLowerCase();
          resultsDiv.innerHTML = '';
          
          if (v.length < 2) {
            resultsDiv.style.display = 'none';
            return;
          }

          const matches = drugData.filter(d => d.n.toLowerCase().includes(v));

          if (matches.length === 0) {
            resultsDiv.innerHTML = '<div class="opt" style="color:#aaa">Sem resultados</div>';
          } else {
            matches.forEach(d => {
              const div = document.createElement('div');
              div.className = 'opt';
              div.textContent = d.n;
              div.addEventListener('click', () => selectDrug(d));
              resultsDiv.appendChild(div);
            });
          }
          resultsDiv.style.display = 'block';
        });
      }

      function selectDrug(d) {
        selectedDrug = d;
        el('search').value = d.n;
        resultsDiv.style.display = 'none';
        
        let safeRef = d.ref ? `(${d.ref})` : '';
        el('drugInfo').innerHTML = `<b>Dose Tóxica:</b> ${d.d} ${d.u}/kg | <b>MV:</b> ${d.mv} <span style="color:#94a3b8">${safeRef}</span>`;
        
        el('panel').style.display = 'none';
        el('clinical').style.display = 'none';
        el('dose').value = '';
        recalc();
      }

      // === CÁLCULO ===
      const inputs = [el('weight'), el('dose'), el('unit')];
      inputs.forEach(input => {
        if(input) input.addEventListener('input', recalc);
      });

      function recalc() {
        if (!selectedDrug) return;
        const w = parseFloat(el('weight').value);
        const d = parseFloat(el('dose').value);
        if (!w || !d) return;

        const unit = el('unit').value;
        const dMg = unit === 'g' ? d * 1000 : (unit === 'mcg' ? d / 1000 : d);
        
        let toxicLimit = selectedDrug.d;
        if(selectedDrug.u === 'mcg') toxicLimit = toxicLimit / 1000;
        
        const totalToxicLimit = toxicLimit * w;

        const p = el('panel');
        p.style.display = 'block';

        if (dMg >= totalToxicLimit) {
          p.className = 'panel toxic';
          el('statusTitle').innerText = '⚠️ RISCO TÓXICO';
          el('statusDesc').innerHTML = `Ingerido: <b>${dMg.toFixed(1)} mg</b><br>Limite: ${totalToxicLimit.toFixed(1)} mg`;
          el('clinical').style.display = 'block';
          buildActions();
          checkTime();
        } else {
          p.className = 'panel safe';
          el('statusTitle').innerText = '✅ SEGURO';
          el('statusDesc').innerHTML = `Abaixo do limiar tóxico`;
          el('clinical').style.display = 'none';
        }
      }

      function buildActions() {
        const area = el('actionsArea');
        area.innerHTML = '';

        // NAC
        if (selectedDrug.isNac) {
          const btn = document.createElement('button');
          btn.className = 'btn btn-nac';
          btn.textContent = '💊 Calcular NAC (Protocolo)';
          btn.onclick = () => {
            const w = parseFloat(el('weight').value);
            area.innerHTML = `<div class="result-box res-blue" style="display:block"><b>Protocolo NAC:</b><br>Ataque: ${(w * 150).toFixed(0)} mg (1h)<br>Manutenção: ${(w * 50).toFixed(0)} mg (4h)</div>`;
          };
          area.appendChild(btn);
        }

        // Antídotos
        if (selectedDrug.ant && selectedDrug.inds) {
          const label = 'Avaliar Indicação';
          const btn = document.createElement('button');
          btn.className = 'btn btn-blue';
          btn.textContent = `💉 ${label}: ${selectedDrug.ant}`;
          btn.onclick = () => openModal('antidote');
          area.appendChild(btn);
          
          const resDiv = document.createElement('div');
          resDiv.id = 'antidoteResult';
          resDiv.className = 'result-box';
          area.appendChild(resDiv);
        } else if (selectedDrug.ant) {
          let html = `<b>Tratamento:</b> ${selectedDrug.ant}`;
          if (selectedDrug.risk) html += `<br><small style="color:#b91c1c">${selectedDrug.risk}</small>`;
          const div = document.createElement('div');
          div.className = 'result-box res-blue';
          div.style.display = 'block';
          div.innerHTML = html;
          area.appendChild(div);
        }
      }

      // === TEMPO / CARVÃO ===
      const timeSelect = el('time');
      if(timeSelect) timeSelect.addEventListener('change', checkTime);

      function checkTime() {
        const t = timeSelect.value;
        const area = el('charcoalArea');
        area.innerHTML = '';
        if (!t) return;

        if (t === '1') {
          area.innerHTML += `<div class="result-box res-blue" style="display:block">🚫 Lavagem Gástrica: Contraindicada rotineiramente.</div>`;
        }

        if (selectedDrug.noChar) {
          area.innerHTML += `<div class="result-box res-red" style="display:block">⛔ <b>CARVÃO NÃO INDICADO</b><br>Substância injetável, não absorvível ou cáustica.</div>`;
        } else if (['Cocaina', 'Ritalina', 'Venvanse'].some(x => selectedDrug.n.includes(x))) {
          area.innerHTML += `<div class="result-box res-blue" style="display:block">⚠️ Carvão: Apenas se ingestão maciça <1h e Via Aérea SEGURA.</div>`;
        } else if (t !== '4') {
          const btn = document.createElement('button');
          btn.className = 'btn btn-dark';
          btn.textContent = '🌑 Avaliar Carvão Ativado';
          btn.onclick = () => openModal('charcoal');
          area.appendChild(btn);
          
          const resDiv = document.createElement('div');
          resDiv.id = 'charcoalResult';
          resDiv.className = 'result-box';
          area.appendChild(resDiv);
        }
      }

      // === MODAL ===
      const modal = el('modal');
      const btnCancel = el('btnCancel');
      const btnConfirm = el('btnConfirm');

      function openModal(type) {
        modalType = type;
        const list = el('checkList');
        list.innerHTML = '';
        let title, items;

        if (type === 'charcoal') {
          title = 'Contraindicações';
          el('modalDesc').textContent = 'Marque se houver fator de risco:';
          items = ['Rebaixamento s/ Via Aérea', 'Obstrução Intestinal', 'Ingestão de Cáusticos', 'Risco de Aspiração'];
        } else {
          title = `Indicações: ${selectedDrug.ant}`;
          el('modalDesc').textContent = 'Marque os sinais presentes:';
          items = selectedDrug.inds || [];
        }

        el('modalTitle').textContent = title;

        items.forEach(txt => {
          const div = document.createElement('div');
          div.className = 'check-item';
          div.innerHTML = `<div class="circle"></div><span>${txt}</span>`;
          div.addEventListener('click', function() {
            this.classList.toggle('checked');
          });
          list.appendChild(div);
        });

        modal.style.display = 'flex';
      }

      function closeModal() {
        modal.style.display = 'none';
      }

      if(btnCancel) btnCancel.onclick = closeModal;
      
      if(btnConfirm) btnConfirm.onclick = () => {
        closeModal();
        const count = document.querySelectorAll('.check-item.checked').length;

        if (modalType === 'charcoal') {
          const res = el('charcoalResult');
          res.style.display = 'block';
          if (count > 0) {
            res.className = 'result-box res-red';
            res.innerHTML = '⛔ <b>CARVÃO CONTRAINDICADO</b><br>Risco presente.';
          } else {
            const w = parseFloat(el('weight').value);
            res.className = 'result-box res-green';
            res.innerHTML = `✅ <b>CARVÃO INDICADO</b><br>Dose: ${Math.min(50, w).toFixed(0)}g (1g/kg)`;
          }
        } else if (modalType === 'antidote') {
          const res = el('antidoteResult');
          res.style.display = 'block';
          if (count > 0) {
            res.className = 'result-box res-green';
            let html = `✅ <b>INDICADO: ${selectedDrug.ant}</b>`;
            if (selectedDrug.note) html += `<br>${selectedDrug.note}`;
            if (selectedDrug.risk) html += `<br><b style="color:#b91c1c">${selectedDrug.risk}</b>`;
            res.innerHTML = html;
          } else {
            res.className = 'result-box res-blue';
            res.innerHTML = `👁️ <b>Observação Clínica</b><br>Critérios não preenchidos.`;
          }
        }
      };

    }); // Fim do DOMContentLoaded
  </script>
</body>
</html>
