<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ToxiFlow V19</title>

  <!-- === CORREÇÃO DOS ÍCONES (V19) === -->
  <!-- Agora apontando para o arquivo correto: apple-touch-icon.png -->
  
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/apple-touch-icon.png" />
  
  <!-- Manifesto atualizado -->
  <link rel="manifest" href='data:application/manifest+json,{"name":"ToxiFlow","short_name":"ToxiFlow","start_url":".","display":"standalone","theme_color":"#0f172a","background_color":"#f0f2f5","icons":[{"src":"icons/apple-touch-icon.png","sizes":"512x512","type":"image/png"}]}' />

  <!-- CONFIGURAÇÃO DE TELA -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    /* BASE */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding-bottom: 110px; }
    
    /* HEADER */
    header { background: #0f172a; color: white; padding: 24px 20px; border-radius: 0 0 24px 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    p { opacity: 0.8; font-size: 0.9rem; }
    
    /* LAYOUT */
    .container { max-width: 480px; margin: 0 auto; padding: 20px; margin-top: -15px; }
    .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
    
    label { font-size: 0.75rem; font-weight: 800; color: #64748b; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 1rem; margin-bottom: 5px; background: #fff; color: #1e293b; }
    input:focus, select:focus { outline: none; border-color: #2563eb; }

    /* FOOTER FIXO */
    .fixed-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; color: white; display: flex; justify-content: center; gap: 15px; align-items: center; padding: 16px 20px 30px; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.15); }
    .phone-btn { color: white; text-decoration: none; font-weight: 700; background: rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 50px; font-size: 0.9rem; white-space: nowrap; }

    /* COMPONENTES DE INTERFACE */
    .panel { display: none; padding: 20px; border-radius: 16px; color: white; text-align: center; margin-bottom: 15px; }
    .toxic { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .safe { background: linear-gradient(135deg, #22c55e, #15803d); }
    
    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; color: white; cursor: pointer; margin-top: 10px; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-dark { background: #334155; }
    .btn-blue { background: #2563eb; }
    .btn-nac { background: #7c3aed; }
    
    .result-box { margin-top:12px; padding:15px; border-radius:12px; font-size:0.95rem; line-height:1.4; display:none; animation: fadeIn 0.3s; }
    .res-green { background:#dcfce7; color:#166534; border:1px solid #86efac; }
    .res-red { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .res-blue { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; }
    
    @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
    .modal-box { background: white; width: 90%; max-width: 400px; padding: 24px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    
    .check-item { padding: 16px; margin-bottom: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.2s; }
    .check-item.checked { background: #eff6ff; border-color: #2563eb; }
    .circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #cbd5e1; background: white; flex-shrink: 0; display:grid; place-items:center; }
    .check-item.checked .circle { background: #2563eb; border-color: #2563eb; }
    .check-item.checked .circle::after { content:'✓'; color:white; font-size:14px; font-weight:bold; }

    /* AUTOCOMPLETE / BUSCA */
    .results { background: white; border: 1px solid #e2e8f0; max-height: 250px; overflow-y: auto; display: none; position: absolute; top: 85px; left: 20px; right: 20px; border-radius: 12px; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .opt { padding: 14px 18px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    .opt:active { background: #f1f5f9; }
  </style>
</head>
<body>

  <header>
    <h1>ToxiFlow</h1>
    <p>CIATox-BA v19.0</p>
  </header>

  <div class="container">
    <div class="card">
      <label>Substância (Busca Rápida)</label>
      <input type="text" id="search" placeholder="Ex: Mounjaro, Cetamina..." autocomplete="off">
      <div class="results" id="results"></div>
      <div id="drugInfo" style="margin-top:12px; font-size:0.95rem; color:#475569; padding-top:10px; border-top:1px dashed #e2e8f0;"></div>
    </div>

    <div class="card">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div>
          <label>Peso (kg)</label>
          <input type="number" id="weight" placeholder="70" inputmode="decimal">
        </div>
        <div>
          <label>Dose Ingerida</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="dose" placeholder="0" inputmode="decimal">
            <select id="unit" style="width:80px;"><option value="mg">mg</option><option value="g">g</option><option value="mcg">mcg</option></select>
          </div>
        </div>
      </div>
    </div>

    <div id="panel" class="panel">
      <h2 id="statusTitle" style="margin:0 0 5px 0;"></h2>
      <p id="statusDesc"></p>
    </div>

    <div id="clinical" style="display:none;">
      
      <!-- BOTÕES DE AÇÃO (NAC, Antídoto) -->
      <div id="actionsArea"></div>

      <!-- TEMPO DECORRIDO / CARVÃO -->
      <div class="card" style="margin-top:15px;">
        <label>Tempo Decorrido</label>
        <select id="time" onchange="checkTime()">
          <option value="">Selecione...</option>
          <option value="1">&lt; 1 hora</option>
          <option value="2">1 a 2 horas</option>
          <option value="4">> 2 horas</option>
        </select>
        <div id="charcoalArea"></div>
      </div>

    </div>
  </div>

  <div class="fixed-footer">
    <a href="tel:08002844343" class="phone-btn">📞 0800 284 4343</a>
    <a href="tel:7131034343" class="phone-btn">📞 (71) 3103-4343</a>
  </div>

  <!-- MODAL DE CHECKLIST -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <h3 id="modalTitle" style="color:#0f172a; margin:0 0 10px 0;"></h3>
      <p id="modalDesc" style="color:#64748b; font-size:0.9rem; margin-bottom:15px;"></p>
      
      <div id="checkList"></div>
      
      <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:10px; margin-top:20px;">
        <button class="btn btn-dark" style="margin:0; background:#e2e8f0; color:#334155;" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-blue" style="margin:0;" onclick="confirmModal()">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    // === BANCO DE DADOS COMPLETO V19 ===
    const db = [
      // === NOVOS (Mounjaro / Cetamina) ===
      {
        n:"Mounjaro (Tirzepatida)", d:0.01, u:"mg", mv:"5d", 
        ant:"Suporte (Reidratação)", 
        risk:"⚠️ Risco de Desidratação Grave e Pancreatite.", ref:"AACT"
      },
      {
        n:"Cetamina (Ketamina)", d:2, u:"mg", mv:"2.5h", 
        ant:"Benzodiazepínicos (Agitação)", 
        inds:["Agitação Grave", "Alucinações", "Hipertensão"],
        risk:"⚠️ Risco: Laringoespasmo e Emergência Psiquiátrica.", ref:"AACT"
      },

      // === ESTIMULANTES & ANTIDEPRESSIVOS ===
      {n:"Bupropiona", d:10, u:"mg", mv:"20h", ant:"Benzodiazepínicos", risk:"⚠️ ALTO RISCO: Convulsões e Cardiotoxicidade.", ref:"AACT"},
      {n:"Ritalina (Metilfenidato)", d:1, u:"mg", mv:"3h", ant:"Benzodiazepínicos", inds:["Agitação", "Taquicardia"], risk:"⚠️ Síndrome Simpaticomimética.", ref:"AACT"},
      {n:"Venvanse (Lisdexanfetamina)", d:1, u:"mg", mv:"1h", ant:"Benzodiazepínicos", inds:["Agitação", "Convulsão"], risk:"⚠️ Síndrome Simpaticomimética.", ref:"AACT"},
      {n:"Atomoxetina", d:2, u:"mg", mv:"5h", ant:"Suporte", risk:"⚠️ Taquicardia e Agitação.", ref:"AACT"},

      // === DIABETES / EMAGRECIMENTO ===
      {n:"Ozempic (Semaglutida)", d:0.01, u:"mg", mv:"1sem", ant:"Suporte", risk:"⚠️ Vômitos, Desidratação, Pancreatite.", ref:"AACT"},
      {n:"Saxenda (Liraglutida)", d:0.1, u:"mg", mv:"13h", ant:"Suporte", risk:"⚠️ Desidratação grave.", ref:"AACT"},
      {n:"Jardiance (Empagliflozina)", d:10, u:"mg", mv:"12h", ant:"Protocolo Cetoacidose", risk:"⛔ Cetoacidose Euglicêmica.", ref:"AACT"},
      {n:"Dapagliflozina", d:10, u:"mg", mv:"12h", ant:"Protocolo Cetoacidose", risk:"⛔ Cetoacidose Euglicêmica.", ref:"AACT"},
      {n:"Glibenclamida", d:0.1, u:"mg", mv:"10h", ant:"Octreotide", inds:["Hipoglicemia refratária"], ref:"AACT"},
      {n:"Metformina", d:80, u:"mg", mv:"6h", ant:"Hemodiálise (Se Acidose)", risk:"⛔ Acidose Lática Grave (MALA).", ref:"AACT"},

      // === CARDIO & GERAIS ===
      {n:"Propranolol", d:8, u:"mg", mv:"4h", ant:"Glucagon", inds:["Bradicardia", "Choque"], ref:"AACT"},
      {n:"Atenolol", d:5, u:"mg", mv:"6h", ant:"Glucagon", inds:["Bradicardia", "Choque"], ref:"AACT"},
      {n:"Anlodipino", d:0.3, u:"mg", mv:"50h", ant:"Cálcio + Insulina (HIET)", inds:["Choque Vasoplégico"], ref:"AACT"},
      {n:"Carbamazepina", d:20, u:"mg", mv:"20h", ant:"Carvão Ativado Seriado", risk:"⚠️ Neurotoxicidade.", ref:"AACT"},
      {n:"Varfarina", d:0.5, u:"mg", mv:"40h", ant:"Vitamina K", inds:["Sangramento ativo"], ref:"AACT"},
      {n:"Dipirona", d:100, u:"mg", mv:"2-4h", ant:"Suporte", risk:"⚠️ Choque Vasoplégico.", ref:"AACT"},
      {n:"Escopolamina", d:2, u:"mg", mv:"8h", ant:"Suporte", risk:"⚠️ Síndrome Anticolinérgica.", ref:"AACT"},
      {n:"Metoclopramida", d:2, u:"mg", mv:"6h", ant:"Biperideno", inds:["Distonia Aguda"], ref:"AACT"},
      
      // === CLÁSSICOS ===
      {n:"Quetiapina", d:15, u:"mg", mv:"7h", ant:"Emulsão Lipídica", risk:"⚠️ Hipotensão/Coma.", ref:"AACT"},
      {n:"Sertralina", d:10, u:"mg", mv:"26h", ant:"Suporte", risk:"⚠️ Síndrome Serotoninérgica.", ref:"AACT"},
      {n:"Escitalopram", d:5, u:"mg", mv:"30h", ant:"Suporte", risk:"⚠️ Risco de Torsades.", ref:"AACT"},
      {n:"Cocaina", d:1.0, u:"mg", mv:"1h", ant:"Benzodiazepínicos", inds:["Agitação", "Dor Torácica"], risk:"🚫 ABSOLUTO: Não usar Beta-bloq.", ref:"AHA"},
      {n:"Clonazepam", d:0.6, u:"mg", mv:"40h", ant:"Flumazenil", inds: ["Depressão resp grave"], risk: "🚫 Risco de convulsão.", ref:"AACT"},
      {n:"Diazepam", d:0.7, u:"mg", mv:"48h", ant:"Flumazenil", inds: ["Depressão resp (<90%)"], risk: "🚫 Risco de convulsão.", ref:"AACT"},
      {n:"Midazolam", d:1.0, u:"mg", mv:"2.5h", ant:"Flumazenil", inds:["Depressão resp grave"], ref:"AACT"},
      {n:"Morfina", d:0.4, u:"mg", mv:"3h", ant:"Naloxona", inds: ["FR < 12", "Miose"], ref:"AACT"},
      {n:"Tramadol", d:4, u:"mg", mv:"9h", ant:"Naloxona", inds:["Depressão Resp"], risk:"⚠️ Risco de convulsão.", ref:"AACT"},
      {n:"Paracetamol", d:75, u:"mg", mv:"3h", ant:"NAC (Acetilcisteína)", isNac:true, ref:"Rumack"},
      {n:"Lidocaina", d:5, u:"mg", mv:"1.5h", ant:"Emulsão Lipídica 20%", inds:["PCR / Choque"], ref:"AACT"},
      {n:"Digoxina", d:20, u:"mcg", mv:"40h", ant:"Ac Anti-Digoxina", inds:["Arritmia", "K+ > 5.0"], ref:"AACT"},
      {n:"Amitriptilina", d:3, u:"mg", mv:"25h", ant:"Bicarbonato de Sódio", inds:["QRS > 100ms"], ref:"AACT"},
      {n:"AAS", d:100, u:"mg", mv:"30h", ref:"AACT"},
      {n:"Litio", d:50, u:"mg", mv:"24h", noChar:true, ref:"AACT"},
      {n:"Ferro", d:20, u:"mg", mv:"6h", noChar:true, ref:"AACT"}
    ];

    let sel = null; 
    let modalType = ''; 
    const el = id => document.getElementById(id);

    // --- FUNÇÕES DE INTERFACE ---
    el('search').oninput = (e) => {
      const v = e.target.value.toLowerCase();
      const res = el('results');
      res.innerHTML = '';
      if(v.length < 2) { res.style.display='none'; return; }
      const m = db.filter(d => d.n.toLowerCase().includes(v) || (d.n.toLowerCase().includes('mounjaro') && v.includes('tirzepatida')));
      
      if(!m.length) {
        res.innerHTML = '<div class="opt" style="color:#aaa">Sem resultados</div>';
      } else {
        m.forEach(d => {
          const div = document.createElement('div');
          div.className = 'opt'; 
          div.textContent = d.n;
          div.onclick = () => selectDrug(d);
          res.appendChild(div);
        });
      }
      res.style.display = 'block';
    };

    function selectDrug(d) {
      sel = d;
      el('search').value = d.n;
      el('results').style.display = 'none';
      el('drugInfo').innerHTML = `<b>Dose Tóxica:</b> ${d.d} ${d.u}/kg | <b>MV:</b> ${d.mv} <span style="color:#94a3b8">(${d.ref})</span>`;
      el('panel').style.display='none'; 
      el('clinical').style.display='none'; 
      el('dose').value = '';
      calc();
    }

    [el('weight'), el('dose'), el('unit')].forEach(i => i.oninput = calc);

    function calc() {
      if(!sel) return;
      const w = parseFloat(el('weight').value);
      const d = parseFloat(el('dose').value);
      if(!w || !d) return;

      const unit = el('unit').value;
      const dMg = unit==='g'?d*1000 : (unit==='mcg'?d/1000 : d);
      const limit = (sel.u==='mcg'?sel.d/1000 : sel.d) * w;

      const p = el('panel');
      p.style.display = 'block';
      
      if(dMg >= limit) {
        p.className = 'panel toxic';
        el('statusTitle').innerText = '⚠️ RISCO TÓXICO';
        el('statusDesc').innerHTML = `Ingerido: <b>${dMg.toFixed(1)} mg</b><br>Limite: ${limit.toFixed(1)} mg`;
        
        el('clinical').style.display = 'block';
        buildActions(); 
        checkTime();
      } else {
        p.className = 'panel safe';
        el('statusTitle').innerText = '✅ SEGURO';
        el('statusDesc').innerHTML = `Abaixo do limiar tóxico`;
        el('clinical').style.display = 'none';
      }
    }

    function buildActions() {
      const area = el('actionsArea'); 
      area.innerHTML = '';

      if(sel.isNac) {
        const btn = document.createElement('button'); 
        btn.className = 'btn btn-nac'; 
        btn.innerHTML = '💊 Calcular NAC (Protocolo)';
        btn.onclick = () => {
          const w = parseFloat(el('weight').value);
          area.innerHTML = `<div class="result-box res-blue" style="display:block"><b>Protocolo NAC:</b><br>Ataque: ${(w*150).toFixed(0)} mg (1h)<br>Manutenção: ${(w*50).toFixed(0)} mg (4h)</div>`;
        };
        area.appendChild(btn);
      }

      if(sel.ant && sel.inds) {
        const label = (sel.n.includes('Cocaina') || sel.n.includes('Metoclopramida') || sel.n.includes('Ritalina') || sel.n.includes('Venvanse') || sel.n.includes('Cetamina')) ? 'Tratamento' : 'Antídoto';
        const btn = document.createElement('button'); 
        btn.className = 'btn btn-blue'; 
        btn.innerHTML = `💉 Avaliar ${label}: ${sel.ant}`;
        btn.onclick = () => openModal('antidote');
        area.appendChild(btn);
        
        const resDiv = document.createElement('div'); 
        resDiv.id = 'antidoteResult'; 
        resDiv.className = 'result-box';
        area.appendChild(resDiv);
      } else if (sel.ant) {
        let html = `<b>Tratamento/Antídoto:</b> ${sel.ant}`;
        if(sel.risk) html += `<br><small style="color:#b91c1c">${sel.risk}</small>`;
        area.innerHTML += `<div class="result-box res-blue" style="display:block">${html}</div>`;
      }
    }

    function checkTime() {
      const t = el('time').value; 
      const area = el('charcoalArea'); 
      area.innerHTML = '';
      if(!t) return;

      if(t === '1') area.innerHTML += `<div class="result-box res-blue" style="display:block">🚫 Lavagem Gástrica: Contraindicada rotineiramente.</div>`;
      
      if(sel.noChar) {
        area.innerHTML += `<div class="result-box res-red" style="display:block">⛔ Carvão Contraindicado (Não absorve/Risco).</div>`;
      } else if (sel.n.includes('Cocaina') || sel.n.includes('Ritalina') || sel.n.includes('Venvanse')) {
         area.innerHTML += `<div class="result-box res-blue" style="display:block">⚠️ Carvão: Apenas se <1h e Via Aérea SEGURA (Risco de convulsão/agitação).</div>`;
      } else if(t !== '4') {
        const btn = document.createElement('button'); 
        btn.className = 'btn btn-dark'; 
        btn.innerHTML = '🌑 Avaliar Carvão Ativado';
        btn.onclick = () => openModal('charcoal'); 
        area.appendChild(btn);
        const resDiv = document.createElement('div'); resDiv.id = 'charcoalResult'; resDiv.className = 'result-box';
        area.appendChild(resDiv);
      }
    }

    function openModal(type) {
      modalType = type; 
      const list = el('checkList'); 
      list.innerHTML = '';
      let title, items;
      
      if(type === 'charcoal') {
        title = 'Contraindicações'; 
        el('modalDesc').innerText = 'Marque se houver fator de risco:';
        items = ['Rebaixamento s/ Via Aérea', 'Obstrução Intestinal', 'Ingestão de Cáusticos', 'Risco de Aspiração'];
      } else {
        const label = (sel.n.includes('Cocaina')) ? 'Indicações de Tratamento' : `Indicações: ${sel.ant}`;
        title = label; 
        el('modalDesc').innerText = 'Marque os sinais presentes:';
        items = sel.inds || [];
      }
      
      el('modalTitle').innerText = title;
      
      items.forEach(txt => {
        const div = document.createElement('div'); 
        div.className = 'check-item';
        div.innerHTML = `<div class="circle"></div><span>${txt}</span>`;
        div.onclick = function() { this.classList.toggle('checked'); };
        list.appendChild(div);
      });
      el('modal').style.display = 'flex';
    }

    function closeModal() { el('modal').style.display = 'none'; }
    
    function confirmModal() {
      closeModal(); 
      const count = document.querySelectorAll('.check-item.checked').length;
      
      if(modalType === 'charcoal') {
        const res = el('charcoalResult'); 
        res.style.display = 'block';
        if(count > 0) { 
          res.className = 'result-box res-red'; 
          res.innerHTML = '⛔ <b>CARVÃO CONTRAINDICADO</b><br>Risco presente.'; 
        } else { 
          const w = parseFloat(el('weight').value); 
          res.className = 'result-box res-green'; 
          res.innerHTML = `✅ <b>CARVÃO INDICADO</b><br>Dose: ${Math.min(50, w).toFixed(0)}g (1g/kg)`; 
        }
      } else if(modalType === 'antidote') {
        const res = el('antidoteResult'); 
        res.style.display = 'block';
        if(count > 0) {
          res.className = 'result-box res-green';
          let html = `✅ <b>INDICADO: ${sel.ant}</b>`;
          if(sel.note) html += `<br>${sel.note}`;
          if(sel.risk) html += `<br><b style="color:#b91c1c">${sel.risk}</b>`; 
          res.innerHTML = html;
        } else {
          res.className = 'result-box res-blue'; 
          res.innerHTML = `👁️ <b>Observação Clínica</b><br>Critérios não preenchidos.`;
        }
      }
    }
  </script>
</body>
</html>
