<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TOKBASE | CIATox</title>

  <!-- PWA -->
  <meta name="theme-color" content="#1e3a8a">
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TOKBASE">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    :root {
      --primary: #1e3a8a;
      --accent: #3b82f6;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #1e293b;
      --danger: #dc2626;
      --warning: #d97706;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      margin: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-main);
      padding-top: calc(env(safe-area-inset-top) + 8px);
      padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
    }

    .app-shell {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 24px 20px;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      text-align: center;
    }

    .content { padding: 20px; flex-grow: 1; }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      position: relative;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      background: #f8fafc;
      -webkit-appearance: none;
    }

    /* Resultados da Busca */
    #results {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 86px;
      z-index: 100;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      display: none;
      max-height: 220px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .opt {
      padding: 14px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
    }

    /* Painel de Risco */
    #result-panel {
      display: none;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }

    .bg-toxic { background: linear-gradient(135deg, #dc2626, #991b1b); }
    .bg-safe  { background: linear-gradient(135deg, #16a34a, #15803d); }

    /* Botões */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      font-size: 1rem;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-charcoal { background: #334155; color: white; }
    .btn-lavage   { background: #d97706; color: white; }
    .btn-spotify  { background: #1db954; color: white; text-decoration: none; display: block; text-align: center; margin-top: 15px; }

    /* Modal */
    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 85%;
      max-width: 350px;
    }

    .checklist-item {
      margin-bottom: 12px;
    }

    .checklist-item label {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .checklist-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .ref-footer {
      text-align: center;
      font-size: 0.7rem;
      color: #94a3b8;
      padding: 20px;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header>
      <h2 style="margin:0">TOKBASE</h2>
      <p style="margin:5px 0 0; opacity:0.8; font-size:0.8rem">Protocolos CIATox v22.1</p>
    </header>

    <div class="content">
      <!-- BUSCA -->
      <div class="card" id="searchCard">
        <span class="label">Substância</span>
        <input type="text" id="search" placeholder="Buscar..." oninput="searchDataDebounced()" autocomplete="off">
        <div id="results"></div>
        <div id="drugInfo" style="margin-top:8px; font-size:0.75rem; color:#64748b;"></div>
      </div>

      <!-- CALCULADORA -->
      <div class="card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div>
            <span class="label">Peso (kg)</span>
            <input type="number" id="weight" placeholder="0" oninput="calculate()" inputmode="decimal">
          </div>
          <div>
            <span class="label">Dose Total</span>
            <input type="number" id="intake" placeholder="Total" oninput="calculate()" inputmode="decimal">
          </div>
        </div>
      </div>

      <!-- PAINEL DE RESULTADO -->
      <div id="result-panel">
        <div id="resTitle" style="font-weight:800; font-size:1.2rem;"></div>
        <div id="resDetail" style="font-size:0.9rem; margin-top:4px"></div>
      </div>

      <!-- CONDUTA -->
      <div id="clinicalSection" style="display:none">
        <div id="antidoteBox" style="display:none; background:#f5f3ff; border-left:4px solid #7c3aed; padding:15px; border-radius:8px; margin-bottom:15px; color:#4c1d95">
          <small><b>ANTÍDOTO:</b></small> <span id="antidoteText"></span>
        </div>

        <span class="label">Tempo de Ingestão</span>
        <select id="timeWindow" onchange="updateProtocols()">
          <option value="">Selecione o tempo...</option>
          <option value="1">Menos de 1 hora</option>
          <option value="2">Entre 1 e 2 horas</option>
          <option value="4">Mais de 2 horas</option>
        </select>

        <div id="buttonsArea" style="margin-top:10px"></div>
        
        <div style="margin-top:15px; font-size:0.85rem">
          <b>Suporte:</b> <span id="supportText" style="color:#475569"></span>
        </div>
      </div>
    </div>

    <div class="ref-footer">
      Desenvolvido por @biaandrade_c
    </div>
  </div>

  <!-- MODAL DE CONTRAINDICAÇÕES -->
  <div id="ciModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top:0; color:var(--danger)">Contraindicações</h3>
      <p style="font-size:0.8rem; color:#64748b; margin-bottom:15px">Se houver algum item presente, não realize o procedimento.</p>
      
      <div id="ciList"></div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
        <button class="btn" onclick="closeModal()" style="background:#e2e8f0; color:#475569; margin:0">Voltar</button>
        <button class="btn" onclick="confirmProcedure()" style="background:var(--primary); color:white; margin:0">Confirmar</button>
      </div>
    </div>
  </div>

    let selectedDrug = null;
    let currentProcedure = '';

    // Debounce function for search input
    function debounce(func, delay) {
      let timeout;
      return function(...args) {
        const context = this;
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(context, args), delay);
      };
    }

    function performSearch() {
      const term = document.getElementById('search').value.toLowerCase();
      const res = document.getElementById('results');
      res.innerHTML = '';
      if (term.length < 2) { res.style.display = 'none'; return; }

      const filtered = database.filter(d => d.n.toLowerCase().includes(term));
      // Limit results to 30 for performance
      filtered.slice(0, 30).forEach(d => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.textContent = d.n;
        div.onclick = () => {
          selectedDrug = d;
          document.getElementById('search').value = d.n;
          document.getElementById('drugInfo').textContent = `Dose tóxica: ${d.d}${d.unit||'mg'}/kg`;
          res.style.display = 'none';
          calculate();
        };
        res.appendChild(div);
      });
      res.style.display = filtered.length ? 'block' : 'none';
    }

    const searchDataDebounced = debounce(performSearch, 150); // 150ms debounce

    function calculate() {
      if (!selectedDrug) return;
      const w = parseFloat(document.getElementById('weight').value);
      const i = parseFloat(document.getElementById('intake').value);
      const panel = document.getElementById('result-panel');
      const clinical = document.getElementById('clinicalSection');

      if (!w || isNaN(i)) { panel.style.display = 'none'; clinical.style.display = 'none'; return; }

      panel.style.display = 'block';
      const limit = selectedDrug.d * w;

      if (i >= limit) {
        panel.className = 'bg-toxic';
        document.getElementById('resTitle').textContent = "RISCO TÓXICO";
        document.getElementById('resDetail').textContent = `Dose ingerida acima do limite (${limit.toFixed(1)}${selectedDrug.unit||'mg'})`;
        clinical.style.display = 'block';
        document.getElementById('supportText').textContent = selectedDrug.support || "Não disponível";
        if (selectedDrug.ant) {
          document.getElementById('antidoteBox').style.display = 'block';
          document.getElementById('antidoteText').textContent = selectedDrug.ant;
        } else {
          document.getElementById('antidoteBox').style.display = 'none';
        }
        updateProtocols();
      } else {
        panel.className = 'bg-safe';
        document.getElementById('resTitle').textContent = "DOSE SEGURA";
        document.getElementById('resDetail').textContent = "Abaixo do limiar de toxicidade.";
        clinical.style.display = 'none';
      }
    }

    function updateProtocols() {
      const time = document.getElementById('timeWindow').value;
      const area = document.getElementById('buttonsArea');
      area.innerHTML = '';
      if (!time || !selectedDrug) return;

      if (selectedDrug.noCharcoal) {
        area.innerHTML = `<div style="color:var(--danger); font-size:0.8rem; padding:10px; border:1px solid #fecaca; border-radius:8px">⚠️ Carvão ativado não é eficaz para esta substância.</div>`;
        return;
      }

      if (time <= 2) {
        area.innerHTML += `<button class="btn btn-charcoal" onclick="openModal('charcoal')">🌑 Avaliar Carvão Ativado</button>`;
      }
      if (time == 1) {
        area.innerHTML += `<button class="btn btn-lavage" onclick="openModal('lavage')">💧 Avaliar Lavagem Gástrica</button>`;
      }
    }

    const ciData = {
      charcoal: ['Rebaixamento do nível de consciência (sem IOT)', 'Íleo paralítico ou obstrução', 'Ingestão de cáusticos ou hidrocarbonetos'],
      lavage: ['Via aérea desprotegida', 'Ingestão de cáusticos/corrosivos', 'Ingestão de hidrocarbonetos (risco aspiração)']
    };

    function openModal(type) {
      currentProcedure = type;
      const list = document.getElementById('ciList');
      list.innerHTML = '';
      ciData[type].forEach((txt, idx) => {
        const item = document.createElement('div');
        item.className = 'checklist-item';
        item.innerHTML = `
          <label>
            <input type="checkbox" class="ci-check">
            <span>${txt}</span>
          </label>
        `;
        list.appendChild(item);
      });
      document.getElementById('ciModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('ciModal').style.display = 'none'; }

    function confirmProcedure() {
      const checks = document.querySelectorAll('.ci-check');
      let blocked = false;
      checks.forEach(c => { if (c.checked) blocked = true; });

      const area = document.getElementById('buttonsArea');
      closeModal();

      if (blocked) {
        area.innerHTML = `<div style="background:#fef2f2; color:#b91c1c; padding:15px; border-radius:10px; border:1px solid #fecaca; text-align:center">
          <b>⛔ PROCEDIMENTO CONTRAINDICADO</b><br><small>Risco clínico identificado.</small>
        </div>`;
      } else {
        const w = parseFloat(document.getElementById('weight').value);
        const dose = Math.min(50, w); // 1g/kg até 50g
        const msg = currentProcedure === 'charcoal' 
          ? `<b>✅ CARVÃO INDICADO</b><br>Dose: <b>${dose.toFixed(0)}g</b> (1g/kg até 50g).`
          : `<b>✅ LAVAGEM INDICADA</b><br>Realizar técnica padrão com SNG/SOG.`;
        
        area.innerHTML = `<div style="background:#f0fdf4; color:#166534; padding:15px; border-radius:10px; border:1px solid #bbf7d0; text-align:center">
          ${msg}
        </div>
        <a href="https://open.spotify.com/episode/62MCHkjBz50b9khDrcOwEe?si=v8U2Sc57ToSJiaYqlOl1fw" target="_blank" class="btn btn-spotify">🎧 Ouvir Protocolo no Spotify</a>`;
      }
    }

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(error => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
