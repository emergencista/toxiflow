<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <!-- Adicionei timestamp para evitar cache -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ToxiFlow Final V7</title>

  <style>
    /* RESET TOTAL */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding-bottom: 100px; }
    
    /* HEADER NOVO */
    header {
      background: #0f172a; /* Azul Escuro (Diferente do anterior) */
      color: white; padding: 20px; border-radius: 0 0 20px 20px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 5px; }

    /* CARDS */
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    
    label { font-size: 0.8rem; font-weight: bold; color: #64748b; display: block; margin-bottom: 5px; text-transform: uppercase; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; margin-bottom: 10px; background: #fff; }
    
    /* FOOTER FIXO (IGUAL AO PRINT) */
    .fixed-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1e293b; color: white;
      display: flex; justify-content: space-around; align-items: center;
      padding: 15px; z-index: 1000;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
    }
    .phone-btn {
      color: white; text-decoration: none; font-weight: bold;
      background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px;
      font-size: 0.9rem;
    }

    /* MODAL INFALÍVEL */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000;
      display: none; align-items: center; justify-content: center;
    }
    .modal-box { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
    
    /* ITEM DE LISTA GIGANTE PARA CLIQUE */
    .check-item {
      padding: 15px; margin-bottom: 8px; background: #f1f5f9; border-radius: 10px;
      display: flex; align-items: center; gap: 10px; cursor: pointer;
    }
    .check-item.checked { background: #fee2e2; border: 2px solid #ef4444; color: #b91c1c; font-weight: bold; }
    .circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #94a3b8; background: white; }
    .check-item.checked .circle { background: #ef4444; border-color: #ef4444; }

    /* BOTÕES */
    .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
    .btn-dark { background: #334155; }
    .btn-primary { background: #2563eb; }
    
    /* PAINEL */
    .panel { display: none; padding: 20px; border-radius: 12px; color: white; text-align: center; margin-bottom: 15px; }
    .toxic { background: #ef4444; }
    .safe { background: #22c55e; }
    
    /* RESULTADOS */
    .results { background: white; border: 1px solid #ddd; max-height: 200px; overflow-y: auto; display: none; margin-top: -10px; border-radius: 0 0 12px 12px; }
    .opt { padding: 12px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

  <header>
    <h1>ToxiFlow V7</h1>
    <p>CIATox-BA</p>
  </header>

  <div class="container">
    <div class="card">
      <label>Substância (Digite ex: Morfina)</label>
      <input type="text" id="search" placeholder="Buscar..." autocomplete="off">
      <div class="results" id="results"></div>
      <div id="drugInfo" style="margin-top:10px; font-size:0.9rem;"></div>
    </div>

    <div class="card">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div>
          <label>Peso (kg)</label>
          <input type="number" id="weight" placeholder="70">
        </div>
        <div>
          <label>Dose Ingerida</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="dose" placeholder="0">
            <select id="unit" style="width:70px;"><option>mg</option><option>g</option><option>mcg</option></select>
          </div>
        </div>
      </div>
    </div>

    <div id="panel" class="panel">
      <h2 id="statusTitle"></h2>
      <p id="statusDesc"></p>
    </div>

    <div id="clinical" style="display:none;">
      
      <!-- NAC BUTTON -->
      <div id="nacArea" style="display:none; margin-bottom:15px;">
        <button class="btn" style="background:#7c3aed;" onclick="calcNAC()">💊 Calcular NAC</button>
        <div id="nacRes" style="margin-top:10px; background:#f3e8ff; padding:10px; border-radius:10px; display:none; color:#6b21a8;"></div>
      </div>

      <div class="card">
        <label>Tempo Decorrido</label>
        <select id="time" onchange="checkTime()">
          <option value="">Selecione...</option>
          <option value="1">&lt; 1 hora</option>
          <option value="2">1 a 2 horas</option>
          <option value="4">> 2 horas</option>
        </select>
        <div id="actions"></div>
      </div>
    </div>
  </div>

  <div class="fixed-footer">
    <a href="tel:08002844343" class="phone-btn">📞 0800 284 4343</a>
    <a href="tel:7131034343" class="phone-btn">📞 (71) 3103-4343</a>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <h3 style="color:#b91c1c; margin-bottom:15px;">⚠️ Contraindicações</h3>
      <div id="checkList"></div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn btn-dark" onclick="closeModal()">Voltar</button>
        <button class="btn btn-primary" onclick="confirmModal()">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    // BANCO DE DADOS CRÍTICO
    const db = [
      {n:"Morfina", d:0.4, u:"mg", mv:"3h", ant:"Naloxona"},
      {n:"Codeina", d:2.5, u:"mg", mv:"4h", ant:"Naloxona"},
      {n:"Tramadol", d:4, u:"mg", mv:"9h", ant:"Naloxona"},
      {n:"Fentanil", d:0.04, u:"mg", mv:"8h", ant:"Naloxona"},
      {n:"Lidocaina", d:5, u:"mg", mv:"1.5h", ant:"Emulsão"},
      {n:"Paracetamol", d:75, u:"mg", mv:"3h", ant:"NAC"},
      {n:"AAS", d:100, u:"mg", mv:"30h"},
      {n:"Litio", d:50, u:"mg", mv:"24h", noChar:true},
      {n:"Ferro", d:20, u:"mg", mv:"6h", noChar:true}
    ];

    let sel = null;
    const el = id => document.getElementById(id);

    // BUSCA
    el('search').oninput = (e) => {
      const v = e.target.value.toLowerCase();
      const res = el('results');
      res.innerHTML = '';
      
      if(v.length < 2) { res.style.display='none'; return; }
      
      const m = db.filter(d => d.n.toLowerCase().includes(v));
      m.forEach(d => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.textContent = d.n;
        div.onclick = () => {
          sel = d;
          el('search').value = d.n;
          res.style.display = 'none';
          el('drugInfo').innerHTML = `<b>Dose Tóxica:</b> ${d.d} ${d.u}/kg | <b>MV:</b> ${d.mv}`;
          calc();
        };
        res.appendChild(div);
      });
      res.style.display = 'block';
    };

    // CALCULO
    [el('weight'), el('dose'), el('unit')].forEach(i => i.oninput = calc);

    function calc() {
      if(!sel) return;
      const w = parseFloat(el('weight').value);
      const d = parseFloat(el('dose').value);
      if(!w || !d) return;

      const unit = el('unit').value;
      const dMg = unit==='g'?d*1000 : (unit==='mcg'?d/1000 : d);
      const limit = (sel.u==='mcg'?sel.d/1000 : sel.d) * w;

      const p = el('panel');
      p.style.display = 'block';
      
      if(dMg >= limit) {
        p.className = 'panel toxic';
        el('statusTitle').innerText = '⚠️ RISCO TÓXICO';
        el('statusDesc').innerText = `Ingerido: ${dMg} mg | Limite: ${limit} mg`;
        el('clinical').style.display = 'block';
        el('nacArea').style.display = (sel.n==='Paracetamol') ? 'block' : 'none';
        checkTime();
      } else {
        p.className = 'panel safe';
        el('statusTitle').innerText = '✅ SEGURO';
        el('statusDesc').innerText = 'Abaixo da dose tóxica';
        el('clinical').style.display = 'none';
      }
    }

    function calcNAC() {
      const w = el('weight').value;
      el('nacRes').style.display = 'block';
      el('nacRes').innerText = `Dose Ataque: ${(w*150).toFixed(0)} mg`;
    }

    function checkTime() {
      const t = el('time').value;
      const act = el('actions');
      act.innerHTML = '';
      if(!t) return;

      if(t === '1') act.innerHTML += `<div style="padding:10px; background:#e2e8f0; margin-top:10px; border-radius:8px;">🚫 Lavagem não recomendada (Ver Podcast)</div>`;

      if(sel.noChar) {
        act.innerHTML += `<div style="padding:10px; background:#fee2e2; color:#b91c1c; margin-top:10px; border-radius:8px;">🚫 Carvão Contraindicado</div>`;
      } else if(t !== '4') {
        const btn = document.createElement('button');
        btn.className = 'btn btn-dark';
        btn.innerText = '🌑 Avaliar Carvão';
        btn.onclick = openModal;
        act.appendChild(btn);
      }
    }

    // MODAL
    let hasRisk = false;
    function openModal() {
      const list = el('checkList');
      list.innerHTML = '';
      hasRisk = false;
      ['Rebaixamento', 'Obstrução', 'Cáusticos', 'Via Aérea'].forEach(r => {
        const item = document.createElement('div');
        item.className = 'check-item';
        item.innerHTML = `<div class="circle"></div><span>${r}</span>`;
        item.onclick = function() {
          this.classList.toggle('checked');
          hasRisk = document.querySelectorAll('.check-item.checked').length > 0;
        };
        list.appendChild(item);
      });
      el('modal').style.display = 'flex';
    }

    function closeModal() { el('modal').style.display = 'none'; }
    
    function confirmModal() {
      closeModal();
      const act = el('actions');
      if(hasRisk) act.innerHTML += `<div style="padding:10px; background:#fee2e2; color:#b91c1c; margin-top:10px; border-radius:8px;">⛔ Carvão Contraindicado</div>`;
      else act.innerHTML += `<div style="padding:10px; background:#dcfce7; color:#166534; margin-top:10px; border-radius:8px;">✅ Carvão Indicado (1g/kg)</div>`;
    }
  </script>
</body>
</html>
