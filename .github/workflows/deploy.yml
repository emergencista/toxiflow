name: Deploy ToxiFlow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run SQL migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy and configure admin access
        env:
          DEPLOY_USER: ubuntu
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: /home/ubuntu/toxiflow
        run: |
          # Copia arquivos de build
          scp -r .next/ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.next.new/
          scp package.json package-lock.json ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/
          scp public/ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/public.new/ || true
          scp src/ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/src.new/
          
          # Executa deploy remoto
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
            set -e
            cd ${DEPLOY_PATH}
            
            # Backup antigo
            [ -d ".next.backup" ] && rm -rf .next.backup
            [ -d ".next" ] && mv .next .next.backup
            mv .next.new .next
            [ -d "src.backup" ] && rm -rf src.backup
            [ -d "src" ] && mv src src.backup
            mv src.new src
            [ -d "public.backup" ] && rm -rf public.backup || true
            [ -d "public" ] && mv public public.backup || true
            [ -d "public.new" ] && mv public.new public
            
            # Instala dependências
            npm ci --omit=dev
            
            # Atualiza admin IP allowlist no systemd service
            sudo systemctl edit --full toxiflow.service > /tmp/toxiflow.service || true
            
            # Tenta configurar automaticamente se o script existir
            if [ -x "scripts/configure-admin-access.sh" ]; then
              sudo scripts/configure-admin-access.sh "${{ secrets.ADMIN_IP_ALLOWLIST }}" || true
            fi
            
            echo "Deploy e configuração concluídos"
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deploy falhou. Verifique os logs.'
            })
